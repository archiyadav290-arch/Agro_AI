<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgroAI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;text-align:center;}

.card{
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  display:inline-block;
}
.card:hover{background:#334155;}

.live-box{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-top:10px;
}

.upload-box{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.chatbot-box{
  position:fixed;
  bottom:80px;
  right:20px;
  width:260px;
  background:#1e293b;
  padding:10px;
  display:none;
}

.chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}

.extra{
  background:#1e293b;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<!-- SAME HEAD & CSS (NO CHANGE) -->

<body>

<h2>🌱 AgroAI Pro</h2>

<div>
  <div class="card" onclick="showFeature('rain')">🌧 Rain</div>
  <div class="card" onclick="showFeature('advisory')">📊 Advisory</div>
  <div class="card" onclick="showFeature('alert')">⚠ Alerts</div>
  <div class="card" onclick="showFeature('irrigation')">💧 Irrigation</div>
  <div class="card" onclick="showFeature('disease')">🌿 Disease</div>

  <!-- 🔥 NEW BUTTONS -->
  <div class="card" onclick="loadForecast()">📈 ML Forecast</div>
  <div class="card" onclick="sendSMS()">📩 SMS</div>
</div>

<input id="cityInput" placeholder="Enter city">
<button onclick="changeCity()">Get</button>
<button onclick="getLocationWeather()">📍 Location</button>

<div class="live-box">
  <p id="cityName">--</p>
  <p>🌧 Rain: <span id="rain">--</span>%</p>
  <p>🌡 Temp: <span id="temp">--</span>°C</p>
  <p id="adv">Loading...</p>
</div>

<canvas id="weatherChart"></canvas>

<div id="featureBox">Click feature</div>

<!-- AI SECTION -->
<div class="extra">
  <h3>🤖 AI Insights</h3>
  <p id="risk">Risk: --</p>
  <p id="risk_hi"></p>
  <p id="irrigation">Irrigation: --</p>
  <p id="irrigation_hi"></p>
  <p id="cropAlert">Crop Alert: --</p>
</div>

<!-- VOICE -->
<div class="extra">
  <button onclick="speak()">🔊 Voice Advisory</button>
</div>

<!-- WHATSAPP -->
<div class="extra">
  <button onclick="sendWhatsApp()">📲 Send WhatsApp Alert</button>
</div>

<div class="upload-box">
  <input type="file" id="imageInput">
  <img id="preview" width="150">
  <p id="result"></p>
</div>

<div class="chatbot-box" id="chatbox">
  <div id="chatOutput"></div>
  <input id="chatInput">
  <button onclick="sendMsg()">Send</button>
</div>

<div class="chatbot" onclick="toggleChat()">💬</div>

<script>

let currentCity="Bhopal";
let chart,temps=[],rains=[],labels=[];

// GRAPH (REAL TIME)
function updateChart(temp,rain){
  labels.push(new Date().toLocaleTimeString());
  temps.push(temp);
  rains.push(rain);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("weatherChart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {label:"Temp",data:temps},
        {label:"Rain",data:rains}
      ]
    }
  });
}

// WEATHER (BACKEND CONNECTED)
async function getWeather(){
  let res = await fetch(`https://agro-ai-uhyv.onrender.com/weather?city=${currentCity}`);
  let data = await res.json();
  updateUI(data,currentCity);
}

// LOCATION
function getLocationWeather(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    let res = await fetch(`https://agro-ai-uhyv.onrender.com/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
    let data = await res.json();
    updateUI(data,"Your Location 📍");
  });
}

// 🔥 UPDATED UI (REAL AI FROM BACKEND)
function updateUI(data,city){

  document.getElementById("cityName").innerText=city;
  document.getElementById("rain").innerText=data.rain;
  document.getElementById("temp").innerText=data.temperature;

  // ✅ Hindi + English advisory
  document.getElementById("adv").innerText =
    data.advisory + " | " + data.advisory_hi;

  // ✅ REAL AI (backend)
  document.getElementById("risk").innerText = "Risk: " + data.risk;
  document.getElementById("risk_hi").innerText = "जोखिम: " + data.risk_hi;

  document.getElementById("irrigation").innerText = "Irrigation: " + data.irrigation;
  document.getElementById("irrigation_hi").innerText = "सिंचाई: " + data.irrigation_hi;

  // optional crop alert (simple)
  document.getElementById("cropAlert").innerText =
    data.rain > 60 ? "🌿 Fungus Risk" : "🌿 Healthy";

  updateChart(data.temperature,data.rain);
}

// FEATURE BOX (same)
function showFeature(type){
  let r=parseInt(rain.innerText);
  let t=parseInt(temp.innerText);

  if(type=="rain") featureBox.innerText="Rain: "+r+"%";
  else if(type=="advisory") featureBox.innerText=t>35?"🔥 Water crops":"✅ Normal";
  else if(type=="alert") featureBox.innerText=r>70?"🚨 Flood Risk":"🟢 Low Risk";
  else if(type=="irrigation") featureBox.innerText=r>60?"❌ No irrigation":"💧 Irrigation needed";
  else featureBox.innerText=r>60?"🌿 Fungus Risk":"🌿 Healthy";
}

// 🔊 VOICE
function speak(){
  let text=document.getElementById("adv").innerText;
  let msg=new SpeechSynthesisUtterance(text);
  msg.lang="hi-IN";
  speechSynthesis.speak(msg);
}

// 📲 WHATSAPP
function sendWhatsApp(){
  let text=document.getElementById("adv").innerText;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

// 📩 SMS DEMO
function sendSMS(){
  alert("📩 SMS sent to farmer (Demo)");
}

// 📈 ML FORECAST
async function loadForecast(){
  let res = await fetch("https://agro-ai-uhyv.onrender.com/forecast");
  let data = await res.json();

  let labels=[], temps=[], rains=[];

  data.forecast.forEach(d=>{
    labels.push(d.day);
    temps.push(d.temp);
    rains.push(d.rain);
  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("weatherChart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {label:"Temp Forecast",data:temps},
        {label:"Rain Forecast",data:rains}
      ]
    }
  });
}

// IMAGE AI (same)
imageInput.onchange=async e=>{
  let file=e.target.files[0];
  preview.src=URL.createObjectURL(file);

  let fd=new FormData();
  fd.append("file",file);

  let res = await fetch("https://agro-ai-uhyv.onrender.com/predict",{method:"POST",body:fd});
  let data=await res.json();

  result.innerText=data.result;
}

// CHATBOT (IMPROVED)
function toggleChat(){
  chatbox.style.display=chatbox.style.display=="none"?"block":"none";
}

async function sendMsg(){
  let input=chatInput.value;
  chatOutput.innerHTML+=`<div>👨 ${input}</div>`;

  let res = await fetch("https://agro-ai-uhyv.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:input})
  });

  let data=await res.json();

  // ✅ Hindi + English
  chatOutput.innerHTML+=`<div>🤖 ${data.reply} / ${data.reply_hi}</div>`;
  chatInput.value="";
}

// CITY
function changeCity(){
  currentCity=cityInput.value;
  getWeather();
}

getWeather();

</script>

</body>
