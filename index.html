<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgroAI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;text-align:center;}

.card{
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  display:inline-block;
}
.card:hover{background:#334155;}

.box{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-top:10px;
}

.chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🌱 AgroAI Pro</h2>

<input id="cityInput" placeholder="Enter city">
<button onclick="changeCity()">Get</button>
<button onclick="getLocationWeather()">📍 Location</button>

<div class="box">
  <h3 id="cityName">--</h3>
  <p>🌡 Temp: <span id="temp">--</span>°C</p>
  <p>💧 Humidity: <span id="humidity">--</span>%</p>
  <p>🌧 Rain: <span id="rain">--</span>%</p>
</div>

<canvas id="weatherChart"></canvas>

<!-- AI OUTPUT -->
<div class="box">
  <h3>🤖 AI Insights</h3>
  <p id="risk">Risk: --</p>
  <p id="irrigation">Irrigation: --</p>
  <p id="disease">Disease: --</p>
  <p id="pesticide">Pesticide: --</p>
</div>

<!-- ALERT -->
<div class="box">
  <h3>⚠ Alerts</h3>
  <p id="alerts">--</p>
</div>

<!-- VOICE -->
<div class="box">
  <button onclick="playVoice()">🔊 Voice Advisory</button>
</div>

<!-- WHATSAPP -->
<div class="box">
  <button onclick="sendWhatsApp()">📲 Send WhatsApp Alert</button>
</div>

<!-- IMAGE -->
<div class="box">
  <input type="file" id="imageInput">
  <p id="result"></p>
</div>

<script>

let currentCity="Bhopal";
let chart,temps=[],rains=[],labels=[];
let lastData=null;

// GRAPH
function updateChart(temp,rain){
  labels.push(new Date().toLocaleTimeString());
  temps.push(temp);
  rains.push(rain);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("weatherChart"),{
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"Temp",data:temps},
        {label:"Rain",data:rains}
      ]
    }
  });
}

// WEATHER
async function getWeather(){
  let res = await fetch(`https://agro-ai-uhyv.onrender.com/weather?city=${currentCity}`);
  let data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  lastData=data;
  updateUI(data,currentCity);
}

// LOCATION
function getLocationWeather(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    let res = await fetch(`https://agro-ai-uhyv.onrender.com/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
    let data = await res.json();

    lastData=data;
    updateUI(data,"Your Location 📍");
  });
}

// UI
async function updateUI(data,city){

  document.getElementById("cityName").innerText=city;
  document.getElementById("temp").innerText=data.temperature;
  document.getElementById("humidity").innerText=data.humidity;
  document.getElementById("rain").innerText=data.rain_probability;

  document.getElementById("risk").innerText="Risk: "+data.risk;
  document.getElementById("irrigation").innerText="Irrigation: "+data.irrigation;
  document.getElementById("disease").innerText="Disease: "+data.disease;
  document.getElementById("pesticide").innerText="Pesticide: "+data.pesticide;

  updateChart(data.temperature,data.rain_probability);

  // ALERT FETCH
  let alertRes = await fetch(`https://agro-ai-uhyv.onrender.com/alert?temp=${data.temperature}&rain=${data.rain_probability}&humidity=${data.humidity}`);
  let alertData = await alertRes.json();

  document.getElementById("alerts").innerText = alertData.alerts.join(", ");
}

// VOICE (backend)
function playVoice(){
  if(!lastData) return;

  let text = `Temperature ${lastData.temperature} degree. ${lastData.irrigation}`;

  fetch("https://agro-ai-uhyv.onrender.com/voice",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  })
  .then(res=>res.json())
  .then(data=>{
    let audio = new Audio("https://agro-ai-uhyv.onrender.com/"+data.audio_file);
    audio.play();
  });
}

// WHATSAPP
function sendWhatsApp(){
  if(!lastData) return;

  let msg = `🌱 AgroAI Alert:
Temp: ${lastData.temperature}
Rain: ${lastData.rain_probability}%
Advice: ${lastData.irrigation}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

// IMAGE AI
imageInput.onchange=async e=>{
  let file=e.target.files[0];

  let fd=new FormData();
  fd.append("file",file);

  let res = await fetch("https://agro-ai-uhyv.onrender.com/predict",{method:"POST",body:fd});
  let data=await res.json();

  result.innerText=data.result + " | " + (data.solution || "");
}

// CITY
function changeCity(){
  currentCity=cityInput.value;
  getWeather();
}

getWeather();

</script>

</body>
</html>
