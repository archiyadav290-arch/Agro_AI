<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgroAI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;text-align:center;}

.card{
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  display:inline-block;
}
.card:hover{background:#334155;}

.live-box{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-top:10px;
}

.upload-box{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.chatbot-box{
  position:fixed;
  bottom:80px;
  right:20px;
  width:260px;
  background:#1e293b;
  padding:10px;
  display:none;
}

.chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}

.extra{
  background:#1e293b;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🌱 AgroAI Pro</h2>

<div>
  <div class="card" onclick="showFeature('rain')">🌧 Rain</div>
  <div class="card" onclick="showFeature('advisory')">📊 Advisory</div>
  <div class="card" onclick="showFeature('alert')">⚠ Alerts</div>
  <div class="card" onclick="showFeature('irrigation')">💧 Irrigation</div>
  <div class="card" onclick="showFeature('disease')">🌿 Disease</div>

  <div class="card" onclick="loadForecast()">📈 ML Forecast</div>
  <div class="card" onclick="sendSMS()">📩 SMS</div>
</div>

<input id="cityInput" placeholder="Enter city">
<button onclick="changeCity()">Get</button>
<button onclick="getLocationWeather()">📍 Location</button>

<div class="live-box">
  <p id="cityName">--</p>
  <p>🌧 Rain: <span id="rain">--</span>%</p>
  <p>🌡 Temp: <span id="temp">--</span>°C</p>
  <p id="adv">Loading...</p>
</div>

<canvas id="weatherChart"></canvas>

<div id="featureBox">Click feature</div>

<div class="extra">
  <h3>🤖 AI Insights</h3>
  <p id="risk">Risk: --</p>
  <p id="risk_hi"></p>
  <p id="irrigation">Irrigation: --</p>
  <p id="irrigation_hi"></p>
  <p id="cropAlert">Crop Alert: --</p>
</div>

<div class="extra">
  <h3>🌾 Smart Farming AI</h3>

  <select id="soilType">
    <option value="loamy">Loamy Soil</option>
    <option value="clay">Clay Soil</option>
    <option value="sandy">Sandy Soil</option>
  </select>

  <p id="cropReco">Crop: --</p>
  <p id="profit">Profit: --</p>
  <p id="decision">Decision: --</p>
</div>

<div class="extra">
  <button onclick="sendWhatsApp()">📲 Send WhatsApp Alert</button>
</div>

<div class="upload-box">
  <input type="file" id="imageInput">
  <img id="preview" width="150">
  <p id="result"></p>
</div>

<div class="chatbot-box" id="chatbox">
  <div id="chatOutput"></div>
  <input id="chatInput">
  <button onclick="sendMsg()">Send</button>
</div>

<div class="chatbot" onclick="toggleChat()">💬</div>

<script>

let currentCity="Bhopal";
let chart,temps=[],rains=[],labels=[];
let lastData=null;

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

// GRAPH (✅ memory safe)
function updateChart(temp,rain){
  labels.push(new Date().toLocaleTimeString());
  temps.push(temp);
  rains.push(rain);

  // ✅ limit data (important fix)
  if(labels.length > 10){
    labels.shift();
    temps.shift();
    rains.shift();
  }

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("weatherChart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {label:"Temp",data:temps},
        {label:"Rain",data:rains}
      ]
    }
  });
}

// WEATHER
async function getWeather(){
  try {
    let res = await fetch(`https://agro-ai-uhyv.onrender.com/weather?city=${currentCity}`);
    let data = await res.json();

    if(data.error){
      alert(data.error);
      return;
    }

    lastData=data;
    updateUI(data,currentCity);
  } catch(e){
    alert("Server down / slow 😓");
  }
}

// LOCATION
function getLocationWeather(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    try {
      let res = await fetch(`https://agro-ai-uhyv.onrender.com/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
      let data = await res.json();

      if(data.error){
        alert(data.error);
        return;
      }

      lastData=data;
      updateUI(data,"Your Location 📍");
    } catch(e){
      alert("Location API error 😓");
    }
  });
}

// UI UPDATE (✅ strong rain fix)
function updateUI(data,city){

  let rain = Math.max(0, Math.min(100, data.rain ?? data.rain_probability ?? 0));
  let temp = data.temperature ?? 0;

  document.getElementById("cityName").innerText=city;
  document.getElementById("rain").innerText=rain;
  document.getElementById("temp").innerText=temp;

  let soil = document.getElementById("soilType").value;

  let crop = getCrop(temp, rain, soil);
  document.getElementById("cropReco").innerText = "Crop: " + crop;
  document.getElementById("profit").innerText = "Profit: " + getProfit(crop);
  document.getElementById("decision").innerText =
    "Decision: " + getDecision(temp, rain);

  document.getElementById("adv").innerText =
    (data.advisory || "Weather data loaded") + " | " + (data.advisory_hi || "");

  document.getElementById("risk").innerText = "Risk: " + (data.risk || "N/A");
  document.getElementById("risk_hi").innerText = "जोखिम: " + (data.risk_hi || data.risk || "N/A");

  document.getElementById("irrigation").innerText = "Irrigation: " + (data.irrigation || "N/A");
  document.getElementById("irrigation_hi").innerText = "सिंचाई: " + (data.irrigation_hi || data.irrigation || "N/A");

  document.getElementById("cropAlert").innerText =
    rain > 60 ? "🌿 Fungus Risk" : "🌿 Healthy";

  updateChart(temp, rain);
}

// CROPS
function getCrop(temp,rain,soil){
  if(soil=="loamy"){
    if(rain>60) return "🌾 Rice";
    if(temp>30) return "🌽 Maize";
    return "🌿 Wheat";
  }
  if(soil=="clay"){
    if(rain>70) return "🌾 Rice";
    return "🌿 Sugarcane";
  }
  if(soil=="sandy"){
    if(temp>35) return "🌵 Millet";
    return "🌿 Groundnut";
  }
  return "🌿 Wheat";
}

function getProfit(crop){
  if(crop.includes("Rice")) return "₹40K / acre";
  if(crop.includes("Wheat")) return "₹30K / acre";
  if(crop.includes("Maize")) return "₹35K / acre";
  if(crop.includes("Sugarcane")) return "₹50K / acre";
  if(crop.includes("Millet")) return "₹25K / acre";
  return "₹20K / acre";
}

function getDecision(temp,rain){
  if(rain>70) return "🚫 Avoid farming today";
  if(temp>40) return "🌅 Work in evening only";
  return "✅ Safe for farming";
}

// FEATURE
function showFeature(type){
  let r=parseInt(document.getElementById("rain").innerText);
  let t=parseInt(document.getElementById("temp").innerText);
  let box=document.getElementById("featureBox");

  if(type=="rain") box.innerText="Rain: "+r+"%";
  else if(type=="advisory") box.innerText=t>35?"🔥 Water crops":"✅ Normal";
  else if(type=="alert") box.innerText=r>70?"🚨 Flood Risk":"🟢 Low Risk";
  else if(type=="irrigation") box.innerText=r>60?"❌ No irrigation":"💧 Irrigation needed";
  else box.innerText=r>60?"🌿 Fungus Risk":"🌿 Healthy";
}

// IMAGE
imageInput.onchange=async e=>{
  let file=e.target.files[0];
  if(!file) return;

  preview.src=URL.createObjectURL(file);

  let fd=new FormData();
  fd.append("file",file);

  try{
    let res = await fetch("https://agro-ai-uhyv.onrender.com/predict",{method:"POST",body:fd});
    let data=await res.json();
    result.innerText=data.result + " " + (data.result_hi ?? "");
  }catch{
    result.innerText="Server error 😓";
  }
}

// CHATBOT
async function sendMsg(){
  let input=document.getElementById("chatInput").value.trim();
  if(!input) return;

  let chatOutput=document.getElementById("chatOutput");

  chatOutput.innerHTML+=`<div>👨 ${input}</div>`;

  try{
    let res = await fetch("https://agro-ai-uhyv.onrender.com/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:input})
    });

    let data=await res.json();

    chatOutput.innerHTML+=`<div>🤖 ${data.reply} / ${data.reply_hi}</div>`;
  }catch{
    chatOutput.innerHTML+=`<div>🤖 Server error 😓</div>`;
  }

  // ✅ auto scroll
  chatOutput.scrollTop = chatOutput.scrollHeight;

  document.getElementById("chatInput").value="";
}

// CHAT TOGGLE
function toggleChat(){
  let box=document.getElementById("chatbox");
  box.style.display = box.style.display=="none" ? "block" : "none";
}

// CITY (✅ validation added)
function changeCity(){
  let val=document.getElementById("cityInput").value.trim();
  if(!val){
    alert("Enter city name");
    return;
  }
  currentCity=val;
  getWeather();
}

// AUTO UPDATE
document.getElementById("soilType").onchange = () => {
  if(lastData) updateUI(lastData,currentCity);
};

// ✅ dummy functions (important)
async function loadForecast(){
  let res = await fetch("https://agro-ai-uhyv.onrender.com/forecast");
  let data = await res.json();

  alert(JSON.stringify(data.forecast, null, 2));
}

function sendSMS(){
  alert("SMS feature coming soon 📩");
}

function sendWhatsApp(){
  alert("WhatsApp alert sent (demo) 📲");
}

getWeather();

</script>

</body>
</html>
